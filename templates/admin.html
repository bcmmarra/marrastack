<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarraStack | Admin Panel</title>
    <link rel="shortcut icon" href="{{ url_for('static', filename='img/favicon.png') }}" type="image/x-icon">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@700&display=swap"
        rel="stylesheet">
    <style>
        .admin-container {
            width: 90%;
            max-width: 900px;
            margin: 50px auto;
            background: var(--surface-color);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(0, 255, 127, 0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-family: var(--font-mono);
        }

        th {
            text-align: left;
            color: var(--cyber-green);
            border-bottom: 2px solid var(--cyber-green);
            padding: 10px;
        }

        td {
            padding: 12px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--pure-white);
        }

        tr:hover {
            background: rgba(0, 255, 127, 0.02);
        }

        .badge-count {
            background: var(--cyber-green);
            color: var(--bg-color);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="admin-container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div class="logo-text" style="font-size: 1.5rem;">
                <span class="marra">ADMIN</span><span class="stack">PANEL</span>
            </div>
            <span class="badge-count">{{ leads|length }} Inscritos</span>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>E-mail</th>
                    <th>Data de Cadastro</th>
                </tr>
            </thead>
            <tbody>
                {% for lead in leads %}
                <tr>
                    <td>#{{ lead['id'] }}</td>
                    <td>{{ lead['email'] }}</td>
                    <td>{{ lead['data_registro'] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <div style="margin-top: 30px; text-align: center;">
            <a href="/" class="btn-stack" style="text-decoration: none; font-size: 0.8rem;">SAIR</a>
        </div>
    </div>
</body>

</html>
