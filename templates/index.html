<div class="welcome-header">
    <h1 class="glitch-text">BEM-VINDO, BRUNO</h1>
    <p>Selecione uma ferramenta no menu lateral ou nos cards abaixo para iniciar.</p>
</div>

<div class="welcome-header">
    <p>Seus favoritos (Máx. 3)</p>
</div>

<div id="favorites-grid" class="dashboard-grid">
    </div>

<script>
function renderFavorites() {
    const grid = document.getElementById('favorites-grid');
    const favorites = JSON.parse(localStorage.getItem('marra_favs')) || [];
    
    if (favorites.length === 0) {
        grid.innerHTML = '<p style="color: #444;">Nenhum favorito selecionado no menu lateral.</p>';
        return;
    }

    grid.innerHTML = favorites.map(fav => `
        <a href="${fav.url}" class="card-link">
            <div class="card-stack">
                <span class="card-icon">${fav.icon}</span>
                <span class="card-title">${fav.title}</span>
                <p>${fav.desc}</p>
            </div>
        </a>
    `).join('');
}

// Inicializa ao carregar a página
document.addEventListener('DOMContentLoaded', renderFavorites);
</script>

{% endblock %}
